<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | GameFlow Central</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF5A1F',
                        primaryHover: '#E04A15',
                        navy: { DEFAULT: '#0B0F19', card: '#1A1F2B', hover: '#242B3B' },
                        accent: '#3B82F6',
                        lightbg: '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Bebas Neue', 'sans-serif'],
                    },
                    animation: { 'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-mesh-dark {
                background-image: radial-gradient(at 0% 0%, rgba(11,15,25,1) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(26,31,43,0.5) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(11,15,25,1) 0, transparent 50%);
            }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-lightbg dark:bg-navy text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300 min-h-screen flex flex-col">
    <div class="fixed inset-0 z-[-1] opacity-50 dark:opacity-100 bg-mesh-dark pointer-events-none"></div>

    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-navy/80 backdrop-blur-lg">
        <a href="index.html" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-navy-card text-gray-500 dark:text-gray-400 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <div class="relative">
            <button id="menuBtn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-navy-card text-gray-500 dark:text-gray-400 transition-colors">
                <i data-lucide="ellipsis-h" class="w-5 h-5"></i>
            </button>
            <div id="menuDropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-navy-card border border-gray-200 dark:border-gray-800 rounded-xl shadow-lg py-2 opacity-0 pointer-events-none scale-95 transition-all origin-top-right z-50">
                <a id="reportLink" href="#" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">Report User</a>
                <a href="settings.html" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">Settings</a>
                <a href="privacy.html" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">Privacy Policy</a>
            </div>
        </div>
    </div>

    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-6">
        <div id="profileInfo" class="mb-8"></div>
        <div id="postsSection">
            <h2 class="text-lg font-bold mb-4">Posts</h2>
            <div id="postsList" class="space-y-4"></div>
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800">
        <p>&copy; 2026 GameFlow Central. All rights reserved.</p>
    </footer>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { doc, onSnapshot, getDoc, updateDoc, arrayUnion, arrayRemove, increment, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const profileUsername = urlParams.get('u');
        if (!profileUsername) window.location.href = 'index.html';

        const theme = localStorage.getItem('gf_theme') || 'dark';
        const html = document.documentElement;
        if (theme === 'dark') html.classList.add('dark');
        else html.classList.remove('dark');

        const state = {
            currentUser: null,
            profileUser: null,
            profileUserId: null,
            isOwnProfile: false,
            isFollowing: false,
            posts: [],
            postsLoaded: false
        };

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-300 pointer-events-auto';
            toast.innerHTML = `<i data-lucide="info" class="w-4 h-4 text-primary"></i><span class="text-sm font-medium">${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 300);
            }, 3000);
        }

        document.getElementById('menuBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('opacity-0');
            dropdown.classList.toggle('pointer-events-none');
            dropdown.classList.toggle('scale-95');
            dropdown.classList.toggle('opacity-100');
            dropdown.classList.toggle('scale-100');
        });
        document.addEventListener('click', () => {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            dropdown.classList.remove('opacity-100', 'scale-100');
        });

        document.getElementById('reportLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = `report.html?u=${profileUsername}`;
        });

        onAuthStateChanged(auth, (user) => {
            state.currentUser = user;
            if (state.profileUserId) renderProfile();
        });

        async function loadProfileByUsername(username) {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('username', '==', username));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                showToast('User not found');
                window.location.href = 'index.html';
                return;
            }
            const userDoc = snapshot.docs[0];
            state.profileUserId = userDoc.id;
            state.profileUser = { id: userDoc.id, ...userDoc.data() };
            state.isOwnProfile = state.currentUser?.uid === state.profileUserId;
            if (state.currentUser && !state.isOwnProfile) {
                const currentUserDoc = await getDoc(doc(db, 'users', state.currentUser.uid));
                const following = currentUserDoc.data()?.following || [];
                state.isFollowing = following.includes(state.profileUserId);
            }
            renderProfile();
            loadPosts();
        }

        function renderProfile() {
            const container = document.getElementById('profileInfo');
            if (!state.profileUser) {
                container.innerHTML = '<p class="text-center text-gray-500">Loading...</p>';
                return;
            }
            const user = state.profileUser;
            const profilePic = user.profilePicture || '';
            const initials = getInitials(user.displayName || user.username);
            container.innerHTML = `
                <div class="flex flex-col items-center text-center">
                    <div class="w-24 h-24 rounded-full overflow-hidden bg-gray-200 dark:bg-gray-700 mb-4 flex items-center justify-center">
                        ${profilePic ? `<img src="${profilePic}" alt="${user.displayName}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><span class="text-2xl font-bold text-gray-700 dark:text-gray-300" style="display:none;">${initials}</span>` : `<span class="text-2xl font-bold text-gray-700 dark:text-gray-300">${initials}</span>`}
                    </div>
                    <h1 class="text-xl font-bold">${user.displayName || user.username}</h1>
                    <p class="text-sm text-gray-500">@${user.username}</p>
                    <p class="mt-2 text-sm text-gray-700 dark:text-gray-300 max-w-md">${user.bio || ''}</p>
                    <div class="flex gap-2 mt-4">
                        ${state.isOwnProfile ? 
                            '<a href="settings.html" class="px-4 py-2 text-sm font-semibold bg-primary text-white rounded-full hover:bg-primaryHover transition-colors">Edit Profile</a>' :
                            `<button id="followBtn" class="px-4 py-2 text-sm font-semibold rounded-full transition-colors ${state.isFollowing ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white hover:bg-gray-300' : 'bg-primary text-white hover:bg-primaryHover'}">${state.isFollowing ? 'Following' : 'Follow'}</button>`
                        }
                        <button id="shareProfileBtn" class="px-4 py-2 text-sm font-semibold bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded-full hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors flex items-center gap-1"><i data-lucide="share-2" class="w-4 h-4"></i> Share</button>
                    </div>
                </div>
            `;
            lucide.createIcons();

            const followBtn = document.getElementById('followBtn');
            if (followBtn) followBtn.addEventListener('click', handleFollow);

            document.getElementById('shareProfileBtn').addEventListener('click', () => {
                const url = window.location.href;
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(url).then(() => showToast('Profile link copied!'));
                } else {
                    const textArea = document.createElement('textarea'); textArea.value = url; document.body.appendChild(textArea);
                    textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea);
                    showToast('Profile link copied!');
                }
            });
        }

        async function handleFollow() {
            if (!state.currentUser) { window.location.href = 'auth.html'; return; }
            const myUid = state.currentUser.uid;
            const targetUid = state.profileUserId;
            if (myUid === targetUid) return;
            const myRef = doc(db, 'users', myUid);
            const targetRef = doc(db, 'users', targetUid);

            if (state.isFollowing) {
                await updateDoc(myRef, { following: arrayRemove(targetUid), followingCount: increment(-1) });
                await updateDoc(targetRef, { followers: arrayRemove(myUid), followersCount: increment(-1) });
                state.isFollowing = false;
            } else {
                await updateDoc(myRef, { following: arrayUnion(targetUid), followingCount: increment(1) });
                await updateDoc(targetRef, { followers: arrayUnion(myUid), followersCount: increment(1) });
                state.isFollowing = true;
            }
            renderProfile();
        }

        function loadPosts() {
            if (!state.profileUserId) return;
            const postsQuery = query(collection(db, 'posts'), where('authorId', '==', state.profileUserId), orderBy('createdAt', 'desc'));
            onSnapshot(postsQuery, (snap) => {
                const posts = [];
                snap.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
                state.posts = posts;
                state.postsLoaded = true;
                renderPosts();
            }, (error) => {
                state.postsLoaded = true;
                renderPosts();
            });
        }

        function renderPosts() {
            const list = document.getElementById('postsList');
            if (!state.postsLoaded) {
                list.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    list.innerHTML += `
                        <div class="bg-white dark:bg-navy-card rounded-xl p-4 border border-gray-200 dark:border-gray-800 animate-pulse">
                            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                            <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full mb-1"></div>
                            <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-2/3"></div>
                        </div>`;
                }
                return;
            }

            if (state.posts.length === 0) {
                list.innerHTML = `<p class="text-gray-500 dark:text-gray-400 text-sm text-center">${state.isOwnProfile ? "You haven't made any posts yet! <a href='makepost.html' class='text-primary hover:underline'>Make your first post</a>" : "User has no posts yet!"}</p>`;
                return;
            }

            list.innerHTML = '';
            state.posts.forEach(post => {
                const timeAgo = getTimeAgo(post.createdAt?.toDate() || new Date());
                list.innerHTML += `
                    <a href="post.html?p=${post.id}" class="block bg-white dark:bg-navy-card rounded-xl p-4 border border-gray-200 dark:border-gray-800 hover:shadow-md transition-shadow">
                        <h3 class="font-semibold text-gray-900 dark:text-white mb-1">${post.title}</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-2">${post.excerpt || ''}</p>
                        <div class="flex justify-between items-center mt-2 text-xs text-gray-500">
                            <span>${timeAgo}</span>
                            <span class="flex items-center gap-1"><i data-lucide="message-circle" class="w-3 h-3"></i> ${post.commentCount || 0}</span>
                        </div>
                    </a>`;
            });
            lucide.createIcons();
        }

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval > 1) return interval + 'y ago';
            interval = Math.floor(seconds / 2592000);
            if (interval > 1) return interval + 'mo ago';
            interval = Math.floor(seconds / 86400);
            if (interval > 1) return interval + 'd ago';
            interval = Math.floor(seconds / 3600);
            if (interval > 1) return interval + 'h ago';
            interval = Math.floor(seconds / 60);
            if (interval > 1) return interval + 'm ago';
            return 'just now';
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
        }

        loadProfileByUsername(profileUsername);
        lucide.createIcons();
    </script>
</body>
</html>

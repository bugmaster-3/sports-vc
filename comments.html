<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments | GameFlow Central</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF5A1F',
                        primaryHover: '#E04A15',
                        navy: { DEFAULT: '#0B0F19', card: '#1A1F2B', hover: '#242B3B' },
                        accent: '#3B82F6',
                        lightbg: '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Bebas Neue', 'sans-serif'],
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-header {
                @apply bg-white/80 dark:bg-navy/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800;
            }
            .bg-mesh-dark {
                background-image: radial-gradient(at 0% 0%, rgba(11,15,25,1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(26,31,43,0.5) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(11,15,25,1) 0, transparent 50%);
            }
            .like-active { @apply text-primary fill-primary; }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-lightbg dark:bg-navy text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300 min-h-screen flex flex-col">
    <div class="fixed inset-0 z-[-1] opacity-50 dark:opacity-100 bg-mesh-dark pointer-events-none"></div>

    <header class="sticky top-0 z-50 glass-header transition-colors duration-300">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2 shrink-0 group">
                <div class="relative w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center text-white shadow-lg group-hover:scale-105 transition-transform">
                    <i data-lucide="zap" class="w-5 h-5 fill-white"></i>
                </div>
                <span class="font-display text-2xl tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300 hidden sm:block">
                    GameFlow <span class="text-primary">Central</span>
                </span>
            </a>
            <div class="flex items-center gap-3">
                <button id="themeToggle" aria-label="Toggle dark mode" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-navy-card text-gray-500 dark:text-gray-400 transition-colors">
                    <i data-lucide="sun" id="themeIcon" class="w-5 h-5"></i>
                </button>
                <a href="auth.html" id="signInLink" class="px-4 py-1.5 text-sm font-semibold bg-primary text-white rounded-full hover:bg-primaryHover transition-colors">Sign in</a>
                <button id="profileBtn" class="hidden w-8 h-8 rounded-full overflow-hidden border-2 border-gray-200 dark:border-gray-700 hover:border-primary transition-colors" aria-label="User profile">
                    <img id="profilePic" src="https://ui-avatars.com/api/?name=User&background=0B0F19&color=fff" alt="Avatar">
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-8">
        <a href="index.html" class="text-sm text-gray-500 hover:text-primary mb-4 inline-flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to feed</a>
        <div id="postInfo" class="mb-6"></div>

        <div id="commentFormContainer" class="hidden mb-8">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden shrink-0">
                    <img id="commentAvatar" src="https://ui-avatars.com/api/?name=You&background=random" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 space-y-2">
                    <textarea id="commentInput" rows="2" placeholder="Join the conversation..." class="w-full bg-gray-50 dark:bg-navy border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none"></textarea>
                    <div class="flex justify-end">
                        <button id="submitComment" class="bg-primary text-white text-sm font-semibold px-4 py-1.5 rounded-full hover:bg-primaryHover transition-colors">Comment</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="commentsList" class="space-y-4"></div>
    </main>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, doc, onSnapshot, addDoc, deleteDoc, runTransaction, serverTimestamp, getDoc, setDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('p');
        if (!postId) window.location.href = 'index.html';

        const state = {
            currentUser: null,
            post: null,
            comments: [],
            following: [],
            commentLikes: {},
            theme: localStorage.getItem('gf_theme') || 'dark'
        };

        function applyTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (state.theme === 'dark') {
                html.classList.add('dark');
                if (icon) icon.setAttribute('data-lucide', 'sun');
            } else {
                html.classList.remove('dark');
                if (icon) icon.setAttribute('data-lucide', 'moon');
            }
            if (window.lucide) lucide.createIcons();
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('gf_theme', state.theme);
            applyTheme();
        });

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-300 pointer-events-auto';
            toast.innerHTML = `<i data-lucide="info" class="w-4 h-4 text-primary"></i><span class="text-sm font-medium">${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 300);
            }, 3000);
        }

        function updateAuthUI(user) {
            state.currentUser = user;
            const signInLink = document.getElementById('signInLink');
            const profileBtn = document.getElementById('profileBtn');
            const commentForm = document.getElementById('commentFormContainer');
            const commentAvatar = document.getElementById('commentAvatar');

            if (user) {
                signInLink.classList.add('hidden');
                profileBtn.classList.remove('hidden');
                document.getElementById('profilePic').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=0B0F19&color=fff`;
                commentForm.classList.remove('hidden');
                commentAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'You')}&background=random`;
            } else {
                signInLink.classList.remove('hidden');
                profileBtn.classList.add('hidden');
                commentForm.classList.add('hidden');
            }
        }

        document.getElementById('signInLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'auth.html';
        });

        document.getElementById('profileBtn').addEventListener('click', () => {
            if (state.currentUser) window.location.href = `profile.html?u=${state.currentUser.uid}`;
            else window.location.href = 'auth.html';
        });

        onAuthStateChanged(auth, (user) => {
            updateAuthUI(user);
            if (user) {
                listenToFollowing(user.uid);
                listenToCommentLikes(user.uid);
            } else {
                state.following = [];
                state.commentLikes = {};
                renderComments();
            }
        });

        function listenToFollowing(uid) {
            const userRef = doc(db, 'users', uid);
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) state.following = snap.data().following || [];
                else state.following = [];
                renderComments();
            });
        }

        function listenToCommentLikes(uid) {
            if (!postId) return;
            const likesRef = collection(db, 'posts', postId, 'comments');
            onSnapshot(likesRef, (snap) => {
                snap.docChanges().forEach(change => {
                    const commentId = change.doc.id;
                    const likesSub = collection(db, 'posts', postId, 'comments', commentId, 'likes');
                    onSnapshot(likesSub, (likesSnap) => {
                        state.commentLikes[commentId] = likesSnap.docs.some(d => d.id === uid);
                        renderComments();
                    });
                });
            });
        }

        function listenToPost() {
            if (!postId) return;
            const postRef = doc(db, 'posts', postId);
            onSnapshot(postRef, (snap) => {
                if (snap.exists()) {
                    state.post = { id: snap.id, ...snap.data() };
                    renderPostInfo();
                }
            });
        }

        function renderPostInfo() {
            const container = document.getElementById('postInfo');
            if (!state.post) { container.innerHTML = ''; return; }
            container.innerHTML = `
                <h1 class="text-2xl font-bold mb-1">${state.post.title}</h1>
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span>by ${state.post.authorName}</span>
                    <span>•</span>
                    <span>${state.post.commentCount || 0} comments</span>
                </div>
            `;
        }

        function listenToComments() {
            if (!postId) return;
            const commentsRef = collection(db, 'posts', postId, 'comments');
            onSnapshot(commentsRef, (snap) => {
                state.comments = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    state.comments.push({
                        id: doc.id,
                        content: data.content,
                        authorId: data.authorId,
                        authorName: data.authorName,
                        authorUsername: data.authorUsername,
                        likes: data.likes || 0,
                        createdAt: data.createdAt ? data.createdAt.toDate() : new Date()
                    });
                });
                state.comments.sort((a, b) => b.createdAt - a.createdAt);
                renderComments();
            });
        }

        function renderComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';
            if (state.comments.length === 0) {
                list.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-sm">No comments yet.</p>';
                return;
            }
            state.comments.forEach(comment => {
                const liked = state.commentLikes[comment.id] || false;
                const isFollowing = state.following.includes(comment.authorId);
                const isOwn = state.currentUser && state.currentUser.uid === comment.authorId;
                const likeCount = comment.likes;
                const timeAgo = getTimeAgo(comment.createdAt);

                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-navy-card rounded-xl p-4 border border-gray-200 dark:border-gray-800';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-[10px] font-bold">${getInitials(comment.authorName)}</div>
                            <a href="profile.html?u=${comment.authorUsername || comment.authorId}" class="text-sm font-medium hover:underline">${comment.authorName}</a>
                            <span class="text-xs text-gray-500">${timeAgo}</span>
                        </div>
                        ${!isOwn && state.currentUser ? `
                            <button class="follow-btn text-xs font-semibold px-3 py-1 rounded-full transition-colors ${isFollowing ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary hover:text-white'}" data-userid="${comment.authorId}">
                                ${isFollowing ? 'Following' : 'Follow'}
                            </button>
                        ` : ''}
                    </div>
                    <p class="text-sm text-gray-700 dark:text-gray-300 mb-3">${escapeHtml(comment.content)}</p>
                    <div class="flex items-center gap-4 text-sm text-gray-500">
                        <button class="like-btn flex items-center gap-1 hover:text-primary transition-colors ${liked ? 'like-active' : ''}" data-commentid="${comment.id}">
                            <i data-lucide="heart" class="w-4 h-4 ${liked ? 'fill-primary' : ''}"></i> ${likeCount}
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
            attachCommentListeners();
        }

        function attachCommentListeners() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', () => handleLike(btn.dataset.commentid));
            });
            document.querySelectorAll('.follow-btn').forEach(btn => {
                btn.addEventListener('click', () => handleFollow(btn.dataset.userid));
            });
        }

        async function handleLike(commentId) {
            if (!state.currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            const uid = state.currentUser.uid;
            const likeRef = doc(db, 'posts', postId, 'comments', commentId, 'likes', uid);
            const commentRef = doc(db, 'posts', postId, 'comments', commentId);

            try {
                await runTransaction(db, async (transaction) => {
                    const likeSnap = await transaction.get(likeRef);
                    const commentSnap = await transaction.get(commentRef);
                    if (!commentSnap.exists()) return;
                    const currentLikes = commentSnap.data().likes || 0;
                    if (likeSnap.exists()) {
                        transaction.delete(likeRef);
                        transaction.update(commentRef, { likes: currentLikes - 1 });
                    } else {
                        transaction.set(likeRef, { createdAt: serverTimestamp() });
                        transaction.update(commentRef, { likes: currentLikes + 1 });
                    }
                });
            } catch (e) {
                showToast('Failed to update like');
            }
        }

        async function handleFollow(targetUid) {
            if (!state.currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            const myUid = state.currentUser.uid;
            if (myUid === targetUid) return;
            const myRef = doc(db, 'users', myUid);
            const targetRef = doc(db, 'users', targetUid);

            try {
                await runTransaction(db, async (transaction) => {
                    const mySnap = await transaction.get(myRef);
                    const targetSnap = await transaction.get(targetRef);
                    if (!mySnap.exists() || !targetSnap.exists()) return;

                    const myFollowing = mySnap.data().following || [];
                    const targetFollowers = targetSnap.data().followers || [];

                    if (myFollowing.includes(targetUid)) {
                        transaction.update(myRef, { following: arrayRemove(targetUid), followingCount: increment(-1) });
                        transaction.update(targetRef, { followers: arrayRemove(myUid), followersCount: increment(-1) });
                    } else {
                        transaction.update(myRef, { following: arrayUnion(targetUid), followingCount: increment(1) });
                        transaction.update(targetRef, { followers: arrayUnion(myUid), followersCount: increment(1) });
                    }
                });
            } catch (e) {
                showToast('Follow action failed');
            }
        }

        document.getElementById('submitComment').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content || !state.currentUser) return;
            try {
                await addDoc(collection(db, 'posts', postId, 'comments'), {
                    content,
                    authorId: state.currentUser.uid,
                    authorName: state.currentUser.displayName || 'User',
                    authorUsername: state.currentUser.email ? state.currentUser.email.split('@')[0] : 'user',
                    likes: 0,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                showToast('Failed to post comment');
            }
        });

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval > 1) return interval + 'y ago';
            interval = Math.floor(seconds / 2592000);
            if (interval > 1) return interval + 'mo ago';
            interval = Math.floor(seconds / 86400);
            if (interval > 1) return interval + 'd ago';
            interval = Math.floor(seconds / 3600);
            if (interval > 1) return interval + 'h ago';
            interval = Math.floor(seconds / 60);
            if (interval > 1) return interval + 'm ago';
            return 'just now';
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        applyTheme();
        listenToPost();
        listenToComments();
        lucide.createIcons();
    </script>
</body>
</html>

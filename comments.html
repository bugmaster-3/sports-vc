<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments – GameFlow Central</title>
    <meta name="description" content="Join the discussion on the latest sports updates.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF5A1F',
                        primaryHover: '#E04A15',
                        navy: { DEFAULT: '#0B0F19', card: '#1A1F2B', hover: '#242B3B' },
                        accent: '#3B82F6',
                        lightbg: '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Bebas Neue', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-header {
                @apply bg-white/80 dark:bg-navy/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800;
            }
            .bg-mesh-dark {
                background-image: radial-gradient(at 0% 0%, rgba(11,15,25,1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(26,31,43,0.5) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(11,15,25,1) 0, transparent 50%);
            }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-lightbg dark:bg-navy text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300 min-h-screen flex flex-col">
    <div class="fixed inset-0 z-[-1] opacity-50 dark:opacity-100 bg-mesh-dark pointer-events-none"></div>

    <header class="sticky top-0 z-50 glass-header transition-colors duration-300">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="relative w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center text-white shadow-lg group-hover:scale-105 transition-transform">
                    <i data-lucide="zap" class="w-5 h-5 fill-white"></i>
                </div>
                <span class="font-display text-xl tracking-wide hidden sm:block">GameFlow <span class="text-primary">Central</span></span>
            </a>
            <a href="index.html" class="text-sm text-primary hover:underline flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-2xl mx-auto px-4 py-6 w-full">
        <div id="postInfo" class="mb-6 bg-white dark:bg-navy-card rounded-xl p-5 border border-gray-200 dark:border-gray-800"></div>
        <div id="commentsList" class="space-y-4 mb-6"></div>
        <div id="commentForm" class="bg-white dark:bg-navy-card rounded-xl p-4 border border-gray-200 dark:border-gray-800 hidden">
            <textarea id="commentInput" rows="3" placeholder="Write a comment..." class="w-full bg-gray-50 dark:bg-navy border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary outline-none resize-none"></textarea>
            <div class="flex justify-end mt-2">
                <button id="postCommentBtn" class="bg-primary hover:bg-primaryHover text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Post</button>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { doc, getDoc, onSnapshot, collection, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove, increment, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('p');
        if (!postId) window.location.href = 'index.html';

        let currentUser = null;
        let postData = null;
        let comments = [];
        let userLikes = {};
        let isFollowing = false;

        const theme = localStorage.getItem('gf_theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-300 pointer-events-auto';
            toast.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-primary"></i><span class="text-sm font-medium">${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 300);
            }, 3000);
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            document.getElementById('commentForm').classList.toggle('hidden', !user);
            if (postId) {
                loadPost();
                loadComments();
                if (user) loadUserFollowState();
            }
        });

        async function loadPost() {
            const docSnap = await getDoc(doc(db, 'posts', postId));
            if (!docSnap.exists()) {
                document.getElementById('postInfo').innerHTML = '<p class="text-red-500">Post not found.</p>';
                return;
            }
            postData = docSnap.data();
            renderPostInfo();
        }

        function renderPostInfo() {
            const container = document.getElementById('postInfo');
            if (!postData) return;
            container.innerHTML = `
                <h1 class="text-xl font-bold mb-2"><a href="post.html?p=${postId}" class="hover:text-primary">${postData.title}</a></h1>
                <div class="flex items-center gap-2 text-sm">
                    <div class="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-[10px] font-bold">${postData.authorInitials || '?'}</div>
                    <a href="profile.html?u=${postData.authorUsername || ''}" class="font-medium hover:underline">${postData.authorName}</a>
                    <span class="text-gray-400">·</span>
                    <span class="text-gray-500">${postData.createdAt ? getTimeAgo(postData.createdAt.toDate()) : ''}</span>
                </div>
                <button id="followBtn" class="mt-3 px-4 py-1.5 text-sm rounded-full font-semibold transition-colors ${isFollowing ? 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300' : 'bg-primary text-white hover:bg-primaryHover'}">${isFollowing ? 'Following' : 'Follow'}</button>
            `;
            document.getElementById('followBtn').addEventListener('click', toggleFollow);
        }

        async function loadUserFollowState() {
            if (!currentUser || !postData) return;
            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                isFollowing = data.following && data.following.includes(postData.authorId);
                renderPostInfo();
            }
        }

        async function toggleFollow() {
            if (!currentUser) return window.location.href = 'auth.html';
            if (!postData) return;
            const currentUid = currentUser.uid;
            const targetUid = postData.authorId;
            if (currentUid === targetUid) return showToast('You cannot follow yourself.');

            const currentUserRef = doc(db, 'users', currentUid);
            const targetUserRef = doc(db, 'users', targetUid);

            try {
                if (isFollowing) {
                    await updateDoc(currentUserRef, {
                        following: arrayRemove(targetUid),
                        followingCount: increment(-1)
                    });
                    await updateDoc(targetUserRef, {
                        followers: arrayRemove(currentUid),
                        followersCount: increment(-1)
                    });
                    isFollowing = false;
                } else {
                    await updateDoc(currentUserRef, {
                        following: arrayUnion(targetUid),
                        followingCount: increment(1)
                    });
                    await updateDoc(targetUserRef, {
                        followers: arrayUnion(currentUid),
                        followersCount: increment(1)
                    });
                    isFollowing = true;
                }
                renderPostInfo();
                showToast(isFollowing ? 'Following' : 'Unfollowed');
            } catch (e) {
                showToast('Failed to update follow status.');
            }
        }

        function loadComments() {
            const commentsRef = collection(db, 'posts', postId, 'comments');
            const q = query(commentsRef, orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                comments = [];
                snapshot.forEach(doc => {
                    comments.push({ id: doc.id, ...doc.data() });
                });
                renderComments();
            });
            if (currentUser) loadCommentLikes();
        }

        function loadCommentLikes() {
            const likesRef = collection(db, 'posts', postId, 'comments');
            onSnapshot(likesRef, (snapshot) => {
                const newLikes = {};
                snapshot.forEach(commentDoc => {
                    const likesCol = collection(db, 'posts', postId, 'comments', commentDoc.id, 'likes');
                    onSnapshot(likesCol, (likeSnap) => {
                        likeSnap.forEach(like => {
                            if (like.id === currentUser.uid) {
                                newLikes[commentDoc.id] = true;
                            }
                        });
                        userLikes = { ...newLikes };
                        renderComments();
                    });
                });
            });
        }

        function renderComments() {
            const list = document.getElementById('commentsList');
            if (!comments.length) {
                list.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-center py-6">No comments yet. Be the first!</p>';
                return;
            }
            list.innerHTML = comments.map(comment => {
                const liked = userLikes[comment.id] || false;
                const likeCount = comment.likes || 0;
                return `
                <div class="bg-white dark:bg-navy-card rounded-lg p-4 border border-gray-200 dark:border-gray-800">
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-xs font-bold shrink-0">${comment.authorName ? comment.authorName[0].toUpperCase() : '?'}</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <a href="profile.html?u=${comment.authorUsername || ''}" class="font-semibold text-sm hover:underline">${comment.authorName}</a>
                                <span class="text-xs text-gray-500">${comment.createdAt ? getTimeAgo(comment.createdAt.toDate()) : ''}</span>
                            </div>
                            <p class="text-sm text-gray-700 dark:text-gray-300">${comment.content}</p>
                            <div class="flex items-center gap-4 mt-2 text-gray-500 dark:text-gray-400">
                                <button class="like-btn flex items-center gap-1 text-xs font-medium ${liked ? 'text-red-500' : 'hover:text-red-400'}" data-comment-id="${comment.id}">
                                    <i data-lucide="${liked ? 'heart' : 'heart'}" class="w-4 h-4 ${liked ? 'fill-red-500' : ''}"></i> ${likeCount}
                                </button>
                                <span class="text-xs cursor-default">Reply</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
            bindCommentLikeButtons();
        }

        function bindCommentLikeButtons() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (!currentUser) return window.location.href = 'auth.html';
                    const commentId = btn.dataset.commentId;
                    await toggleCommentLike(commentId);
                });
            });
        }

        async function toggleCommentLike(commentId) {
            const commentRef = doc(db, 'posts', postId, 'comments', commentId);
            const likeRef = doc(db, 'posts', postId, 'comments', commentId, 'likes', currentUser.uid);
            try {
                await runTransaction(db, async (transaction) => {
                    const commentSnap = await transaction.get(commentRef);
                    if (!commentSnap.exists()) throw "Comment not found";
                    const likeSnap = await transaction.get(likeRef);
                    if (likeSnap.exists()) {
                        transaction.delete(likeRef);
                        transaction.update(commentRef, { likes: increment(-1) });
                    } else {
                        transaction.set(likeRef, { userId: currentUser.uid });
                        transaction.update(commentRef, { likes: increment(1) });
                    }
                });
            } catch (e) {
                showToast('Failed to update like.');
            }
        }

        document.getElementById('postCommentBtn').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) return;
            if (!currentUser) return window.location.href = 'auth.html';
            try {
                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                const userData = userDoc.data();
                await addDoc(collection(db, 'posts', postId, 'comments'), {
                    content,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || userData?.displayName || 'Anonymous',
                    authorUsername: userData?.username || '',
                    likes: 0,
                    createdAt: serverTimestamp()
                });
                input.value = '';
                await updateDoc(doc(db, 'posts', postId), { commentCount: increment(1) });
            } catch (e) {
                showToast('Failed to post comment.');
            }
        });

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'just now';

            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';

            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';

            const days = Math.floor(hours / 24);
            if (days < 30) return days + 'd ago';

            const months = Math.floor(days / 30);
            if (months < 12) return months + 'mo ago';

            const years = Math.floor(days / 365);
            return years + 'y ago';
        }

        lucide.createIcons();
    </script>
</body>
</html>
